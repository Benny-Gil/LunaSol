name: Deploy to production

on:
  push:
    branches:
      - prod

jobs:
  deploy:
    name: Local deploy
    runs-on: self-hosted
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load env
        run: cp /opt/lunasol/.env .env

      - name: Build images
        run: docker compose -f docker-compose.prod.yml build

      - name: Run migrations
        run: |
          source .env
          docker run --rm \
            --network lunasol-prod_lunasol \
            --env DATABASE_URL \
            lunasol-prod-api \
            /app/node_modules/.bin/prisma migrate deploy

      - name: Start containers
        run: docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Verify deployment
        run: |
          for i in $(seq 1 30); do
            status=$(docker inspect lunasol-prod-api --format '{{.State.Health.Status}}' 2>/dev/null)
            [ "$status" = "healthy" ] && echo "API is healthy" && exit 0
            echo "[$i/30] status=$status, waiting 3s..."
            sleep 3
          done
          echo "Timed out waiting for API. Last 50 log lines:"
          docker logs lunasol-prod-api --tail 50
          exit 1

      - name: Prune old images
        run: docker image prune -f
