name: lunasol
services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    volumes:
      - ./apps/web:/app/apps/web
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    environment:
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - INTERNAL_API_URL=http://api:3001
    depends_on:
      - api
    networks:
      - lunasol

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    volumes:
      - ./apps/api:/app/apps/api
      - /app/apps/api/node_modules
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - NODE_ENV=development
      - AI_SERVICE_URL=http://ai:8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lunasol

  ai:
    build:
      context: apps/ai
      dockerfile: Dockerfile.dev
    volumes:
      - ./apps/ai:/app
      - ./medgemma-1.5-4b-it-IQ4_XS.gguf:/models/model.gguf:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/models/model.gguf
      - MOCK_MODE=${MOCK_MODE:-true}
      - N_GPU_LAYERS=${N_GPU_LAYERS:--1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - lunasol

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lunasol}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunasol

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@lunasol.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - lunasol

  livekit:
    image: livekit/livekit-server:v1.7
    command: --config /etc/livekit.yaml
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    volumes:
      - ./livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7881:7881"           # WebRTC over TCP
      - "50000-50100:50000-50100/udp"  # WebRTC media (UDP)
    networks:
      - lunasol

  nginx:
    image: nginx:alpine
    ports:
      - "81:80"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
      - pgadmin
      - livekit
    networks:
      - lunasol

volumes:
  postgres_data:
  pgadmin_data:

networks:
  lunasol:
    driver: bridge
