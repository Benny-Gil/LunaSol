name: lunasol-prod

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.prod
      args:
        - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    container_name: lunasol-prod-web
    restart: unless-stopped
    environment:
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - INTERNAL_API_URL=http://api:3001
    depends_on:
      api:
        condition: service_healthy
    networks:
      - lunasol

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.prod
    container_name: lunasol-prod-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_WEBHOOK_SECRET=${CLERK_WEBHOOK_SECRET}
      - NODE_ENV=production
      - AI_SERVICE_URL=http://ai:8000
      - AI_ENABLED=${AI_ENABLED:-true}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/ > /dev/null 2>&1; [ $? -ne 4 ]"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - lunasol

  ai:
    build:
      context: apps/ai
      dockerfile: Dockerfile.prod
    container_name: lunasol-prod-ai
    restart: unless-stopped
    volumes:
      - /data/models/model.gguf:/models/model.gguf:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/models/model.gguf
      - MOCK_MODE=${MOCK_MODE:-false}
      - N_GPU_LAYERS=${N_GPU_LAYERS:--1}
      # Defaults to GPU 0. llama-cpp-python is CUDA-built and force-enumerates
      # the GPU on load, hard-aborting (exit 139) if the CUDA context can't fit
      # — e.g. when another workload is holding VRAM on a small card. When the
      # GPU is busy, set CUDA_VISIBLE_DEVICES="" to enumerate 0 devices and fall
      # back to CPU cleanly (the GPU reservation stays so libcuda.so.1 is linkable).
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES-0}
      # Memory tuning: short context + flash attention + quantized KV cache.
      # q8_0 KV halves cache size at <0.1% quality cost (flash_attn required for V quant).
      - N_CTX=${N_CTX:-2048}
      - FLASH_ATTN=${FLASH_ATTN:-true}
      - KV_CACHE_TYPE_K=${KV_CACHE_TYPE_K:-q8_0}
      - KV_CACHE_TYPE_V=${KV_CACHE_TYPE_V:-q8_0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - lunasol

  db:
    image: postgres:16-alpine
    container_name: lunasol-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - lunasol

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: lunasol-prod-pgadmin
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    ports:
      - "127.0.0.1:${PGADMIN_PORT:-5050}:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lunasol

  nginx:
    image: nginx:alpine
    container_name: lunasol-prod-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - lunasol

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: lunasol-prod-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --url http://nginx:80
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - nginx
    networks:
      - lunasol

volumes:
  postgres_data:
  uploads_data:

networks:
  lunasol:
    driver: bridge
